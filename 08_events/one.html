// when we click on google it removes whole ul bcoz it is an li and ul is parent node. there fore to stop that we can use strict checks using if/else

const images=document.querySelector('#images')
images.addEventListener('click',function(e){
 
  console.log(e.target.tagName);
  e.preventDefault()
  if(e.target.tagName==='IMG'){
     let removeIt=e.target.parentNode
        removeIt.remove()
  }
  
})
